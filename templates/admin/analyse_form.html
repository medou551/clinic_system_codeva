{% extends 'admin/base_admin.html' %}
{% block title %}إضافة تحليل{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <h5><i class="fas fa-vials me-2" style="color:#17c3b2"></i>إضافة تحليل طبي</h5>
    <div class="sub">التحاليل ستظهر للمرضى في صفحة التحاليل المتاحة</div>
  </div>
  <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="fas fa-arrow-right me-1"></i>رجوع
  </a>
</div>

<div class="card" style="max-width:500px;margin:0 auto">
  <div class="card-header"><i class="fas fa-flask me-2"></i>بيانات التحليل</div>
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">اسم التحليل <span class="text-danger">*</span></label>
        <input type="text" name="nom" class="form-control" placeholder="مثال: تحليل الدم الكامل CBC" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">الوصف</label>
        <textarea name="description" class="form-control" rows="3" placeholder="وصف مختصر للتحليل (اختياري)"></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">السعر (MRU)</label>
        <input type="number" name="prix" class="form-control" value="0" min="0" step="0.01">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-grow-1">
          <i class="fas fa-plus me-2"></i>إضافة التحليل
        </button>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
