{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إعداد المدير — العيادة الطبية</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family:'Cairo',sans-serif; }
    body { background:linear-gradient(135deg,#0d5aa7,#17c3b2); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .setup-card { background:#fff; border-radius:24px; padding:48px 40px; max-width:480px; width:100%; box-shadow:0 30px 80px rgba(0,0,0,.25); }
    .setup-icon { width:80px; height:80px; background:linear-gradient(135deg,#0d5aa7,#17c3b2); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#fff; margin:0 auto 24px; }
    .setup-title { font-weight:900; font-size:1.6rem; color:#1a2a4a; text-align:center; }
    .setup-sub { color:#64748b; text-align:center; font-size:.95rem; margin-bottom:32px; }
    .form-label { font-weight:700; color:#374151; font-size:.9rem; }
    .form-control { border-radius:12px; border:2px solid #e2e8f0; padding:12px 16px; font-family:inherit; }
    .form-control:focus { border-color:#1a6fc4; box-shadow:0 0 0 3px rgba(26,111,196,.12); }
    .btn-setup { background:linear-gradient(135deg,#0d5aa7,#1a6fc4); color:#fff; border:none; border-radius:12px; padding:14px; font-size:1rem; font-weight:700; width:100%; margin-top:8px; }
    .btn-setup:hover { opacity:.9; color:#fff; }
    .badge-first { background:#fef3c7; color:#92400e; border-radius:20px; padding:6px 16px; font-size:.8rem; font-weight:700; display:inline-block; margin-bottom:20px; }
  </style>
</head>
<body>
<div class="setup-card">
  <div class="setup-icon"><i class="fas fa-user-shield"></i></div>
  <div class="text-center mb-2">
    <span class="badge-first"><i class="fas fa-star me-1"></i>الإعداد الأولي للنظام</span>
  </div>
  <h1 class="setup-title">إنشاء حساب المدير</h1>
  <p class="setup-sub">هذه الصفحة متاحة مرة واحدة فقط لإنشاء أول حساب مدير للعيادة</p>

  {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags|default:'danger' }} rounded-3 mb-3" style="font-size:.9rem">
      {{ msg }}
    </div>
    {% endfor %}
  {% endif %}

  <form method="post" autocomplete="off">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label"><i class="fas fa-user me-1"></i>الاسم الكامل</label>
      <input type="text" name="nom" class="form-control" placeholder="مثال: أحمد ولد محمد" required>
    </div>
    <div class="mb-3">
      <label class="form-label"><i class="fas fa-phone me-1"></i>رقم الهاتف</label>
      <input type="tel" name="telephone" class="form-control" placeholder="مثال: 22223344" required>
    </div>
    <div class="mb-3">
      <label class="form-label"><i class="fas fa-lock me-1"></i>كلمة المرور</label>
      <input type="password" name="password" class="form-control" placeholder="8 أحرف على الأقل" minlength="8" required>
    </div>
    <div class="mb-4">
      <label class="form-label"><i class="fas fa-lock me-1"></i>تأكيد كلمة المرور</label>
      <input type="password" name="password_confirm" class="form-control" placeholder="أعد كتابة كلمة المرور" required>
    </div>
    <button type="submit" class="btn btn-setup">
      <i class="fas fa-shield-alt me-2"></i>إنشاء حساب المدير
    </button>
  </form>
</div>
</body>
</html>
