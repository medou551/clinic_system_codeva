{% extends 'admin/base_admin.html' %}
{% block title %}إضافة طبيب{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <h5><i class="fas fa-user-md me-2" style="color:#17c3b2"></i>إضافة طبيب جديد</h5>
    <div class="sub">سيتم إنشاء حساب تلقائياً — كلمة المرور المؤقتة هي رقم الهاتف</div>
  </div>
  <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="fas fa-arrow-right me-1"></i>رجوع
  </a>
</div>

<div class="card" style="max-width:600px;margin:0 auto">
  <div class="card-header"><i class="fas fa-user-md me-2"></i>بيانات الطبيب</div>
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">الاسم الكامل <span class="text-danger">*</span></label>
        <input type="text" name="nom" class="form-control" placeholder="مثال: أحمد ولد محمد" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">رقم الهاتف <span class="text-danger">*</span></label>
        <input type="tel" name="telephone" class="form-control" placeholder="سيُستخدم كلمة مرور مؤقتة" required>
        <div class="form-text text-warning"><i class="fas fa-info-circle me-1"></i>رقم الهاتف سيكون كلمة المرور المؤقتة للطبيب</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">التخصص</label>
        <select name="specialite" class="form-select">
          <option value="">— اختر التخصص —</option>
          {% for sp in specialites %}
          <option value="{{ sp.pk }}">{{ sp.nom }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">البريد الإلكتروني</label>
        <input type="email" name="email" class="form-control" placeholder="اختياري">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">سنوات الخبرة</label>
        <input type="number" name="annees_experience" class="form-control" value="1" min="0" max="60">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">نبذة عن الطبيب</label>
        <textarea name="bio" class="form-control" rows="3" placeholder="اختياري"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-grow-1">
          <i class="fas fa-user-plus me-2"></i>إضافة الطبيب
        </button>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
