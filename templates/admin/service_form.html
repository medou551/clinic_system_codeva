{% extends 'admin/base_admin.html' %}
{% block title %}إضافة خدمة{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <h5><i class="fas fa-briefcase-medical me-2" style="color:#17c3b2"></i>إضافة خدمة طبية</h5>
    <div class="sub">الخدمات ستظهر للمرضى في صفحة الخدمات العامة</div>
  </div>
  <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="fas fa-arrow-right me-1"></i>رجوع
  </a>
</div>

<div class="card" style="max-width:540px;margin:0 auto">
  <div class="card-header"><i class="fas fa-plus-circle me-2"></i>بيانات الخدمة</div>
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">اسم الخدمة <span class="text-danger">*</span></label>
        <input type="text" name="nom" class="form-control" placeholder="مثال: استشارة عامة" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">الوصف <span class="text-danger">*</span></label>
        <textarea name="description" class="form-control" rows="3" placeholder="وصف مختصر للخدمة" required></textarea>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label fw-bold">السعر (MRU)</label>
          <input type="number" name="prix" class="form-control" value="0" min="0" step="0.01">
        </div>
        <div class="col-6">
          <label class="form-label fw-bold">المدة (دقيقة)</label>
          <input type="number" name="duree" class="form-control" value="30" min="5" max="240">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">أيقونة Font Awesome</label>
        <input type="text" name="icone" class="form-control" value="fa-heartbeat" placeholder="fa-stethoscope">
        <div class="form-text">مثال: fa-stethoscope، fa-heart، fa-microscope، fa-eye، fa-tooth</div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-grow-1">
          <i class="fas fa-plus me-2"></i>إضافة الخدمة
        </button>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
