{% extends 'base.html' %}
{% block title %}مشاركة الملف الطبي<script>
const ro = document.getElementById('lecture_seule');
function syncPerms(){
  const disabled = ro.checked;
  ['peut_ajouter_notes','peut_ajouter_fichiers','peut_creer_ordonnance'].forEach(id => {
    const el = document.getElementById(id);
    el.disabled = disabled;
    if(disabled) el.checked = false;
  });
}
ro.addEventListener('change', syncPerms);
syncPerms();
</script>
{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:820px">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4 p-lg-5">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
          <h3 class="fw-bold mb-1">مشاركة الملف الطبي</h3>
          <div class="text-muted">{{ patient.utilisateur.first_name }} {{ patient.utilisateur.last_name }}</div>
        </div>
        <a href="{% url 'medecin_patient_dossier' patient.id %}" class="btn btn-outline-primary">رجوع</a>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">الطبيب المستفيد</label>
          <select name="medecin_cible" class="form-select" required>
            <option value="">-- اختر الطبيب --</option>
            {% for m in autres_medecins %}<option value="{{ m.id }}">{{ m }} — {{ m.specialite }}</option>{% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">نهاية الصلاحية (اختياري)</label>
          <input type="date" name="date_fin" class="form-control">
        </div>
        <div class="mb-3 form-check">
          <input class="form-check-input" type="checkbox" name="lecture_seule" id="lecture_seule" checked>
          <label class="form-check-label" for="lecture_seule">قراءة فقط</label>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4 form-check">
            <input class="form-check-input" type="checkbox" name="peut_ajouter_notes" id="peut_ajouter_notes">
            <label class="form-check-label" for="peut_ajouter_notes">إضافة ملاحظات</label>
          </div>
          <div class="col-md-4 form-check">
            <input class="form-check-input" type="checkbox" name="peut_ajouter_fichiers" id="peut_ajouter_fichiers">
            <label class="form-check-label" for="peut_ajouter_fichiers">رفع ملفات</label>
          </div>
          <div class="col-md-4 form-check">
            <input class="form-check-input" type="checkbox" name="peut_creer_ordonnance" id="peut_creer_ordonnance">
            <label class="form-check-label" for="peut_creer_ordonnance">إنشاء وصفة</label>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">ملاحظة</label>
          <textarea name="note" class="form-control" rows="4" placeholder="سبب المشاركة أو التعليمات"></textarea>
        </div>
        <button class="btn btn-primary">تأكيد المشاركة</button>
      </form>
    </div>
  </div>
</div>
<script>
const ro = document.getElementById('lecture_seule');
function syncPerms(){
  const disabled = ro.checked;
  ['peut_ajouter_notes','peut_ajouter_fichiers','peut_creer_ordonnance'].forEach(id => {
    const el = document.getElementById(id);
    el.disabled = disabled;
    if(disabled) el.checked = false;
  });
}
ro.addEventListener('change', syncPerms);
syncPerms();
</script>
{% endblock %}
