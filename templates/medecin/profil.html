{% extends 'base.html' %}
{% block title %}الملف الشخصي للطبيب{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:820px">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4 p-lg-5">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
          <h3 class="fw-bold mb-1">الملف الشخصي للطبيب</h3>
          <div class="text-muted">تحديث المعلومات التي يستطيع الطبيب تعديلها بنفسه</div>
        </div>
        <a href="{% url 'medecin_dashboard' %}" class="btn btn-outline-primary">العودة</a>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">الاسم</label><input name="nom" class="form-control" value="{{ admin_obj.nom }}"></div>
          <div class="col-md-6"><label class="form-label">الهاتف الشخصي</label><input name="telephone" class="form-control" value="{{ admin_obj.telephone }}"></div>
          <div class="col-md-6"><label class="form-label">الهاتف المهني</label><input name="telephone_professionnel" class="form-control" value="{{ medecin.telephone }}"></div>
          <div class="col-md-6"><label class="form-label">البريد الإلكتروني</label><input name="email" type="email" class="form-control" value="{{ medecin.email }}"></div>
          <div class="col-md-6"><label class="form-label">سنوات الخبرة</label><input name="annees_experience" type="number" min="1" class="form-control" value="{{ medecin.annees_experience }}"></div>
          <div class="col-md-6"><label class="form-label">التخصص</label><input class="form-control" value="{{ medecin.specialite }}" disabled></div>
          <div class="col-12"><label class="form-label">نبذة</label><textarea name="bio" class="form-control" rows="5">{{ medecin.bio }}</textarea></div>
        </div>
        <button class="btn btn-primary mt-4">حفظ التعديلات</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
