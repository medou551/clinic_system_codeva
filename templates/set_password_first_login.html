{% extends "base.html" %}
{% block title %}تعيين كلمة المرور{% endblock %}
{% block content %}
<div class="container" style="max-width:520px;padding:48px 16px">
  <div class="card shadow-sm border-0" style="border-radius:18px">
    <div class="card-body p-4 p-md-5">
      <h3 class="mb-2">تعيين كلمة المرور</h3>
      <p class="text-muted mb-4">هذا أول دخول لك. يرجى اختيار كلمة مرور جديدة وآمنة.</p>
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">كلمة المرور الجديدة</label>
          <input type="password" name="password" class="form-control" minlength="8" required>
        </div>
        <div class="mb-4">
          <label class="form-label">تأكيد كلمة المرور</label>
          <input type="password" name="password_confirm" class="form-control" minlength="8" required>
        </div>
        <button class="btn btn-primary w-100">حفظ كلمة المرور</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
