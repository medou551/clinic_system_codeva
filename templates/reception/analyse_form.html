{% extends 'reception/base_reception.html' %}
{% block title %}{% if analyse %}تعديل التحليل{% else %}تحليل جديد{% endif %}{% endblock %}
{% block content %}
<div class="topbar">
  <div><h5><i class="fas fa-vial me-2"></i>{% if analyse %}تعديل: {{ analyse.nom }}{% else %}إضافة تحليل جديد{% endif %}</h5></div>
  <a href="{% url 'reception_analyses' %}" class="btn btn-outline-secondary btn-sm px-3">
    <i class="fas fa-arrow-right me-1"></i>رجوع
  </a>
</div>
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold" style="font-size:.85rem">اسم التحليل *</label>
            <input type="text" name="nom" class="form-control" value="{{ analyse.nom|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold" style="font-size:.85rem">الوصف</label>
            <textarea name="description" class="form-control" rows="3">{{ analyse.description|default:'' }}</textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold" style="font-size:.85rem">السعر (MRU) *</label>
            <input type="number" name="prix" class="form-control" value="{{ analyse.prix|default:'0' }}" min="0" step="0.01" required>
          </div>
          <div class="mb-4 form-check form-switch">
            <input class="form-check-input" type="checkbox" name="actif" id="actif-chk"
              {% if not analyse or analyse.actif %}checked{% endif %}>
            <label class="form-check-label fw-bold" for="actif-chk" style="font-size:.85rem">نشط (يظهر في القائمة)</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="fas fa-save me-2"></i>{% if analyse %}حفظ التعديلات{% else %}إضافة التحليل{% endif %}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
